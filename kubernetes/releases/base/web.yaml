apiVersion: v1
kind: Namespace
metadata:
  name: cicor-web
  labels:
    app.kubernetes.io/name: cicor-web
    app.kubernetes.io/part-of: cicor
    app.kubernetes.io/component: web
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cicor-web-config
  namespace: cicor-web
data:
  APP_ENVIRONMENT: local
  APP_TITLE: CICOR
  VITE_API_BASE_URL: http://cicor.local
  FRONTEND_PORT: "3000"
  INGRESS_HOST: cicor.local
  PRIMARY_COLOR: "#1e40af"
  ACCENT_COLOR: "#0f172a"
---
apiVersion: v1
kind: Secret
metadata:
  name: cicor-web-secret
  namespace: cicor-web
type: Opaque
stringData:
  FRONTEND_SESSION_SECRET: cicor-web-local-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicor-web
  namespace: cicor-web
  labels:
    app.kubernetes.io/name: cicor-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: cicor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cicor-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cicor-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: cicor
    spec:
      containers:
        - name: web
          image: cicor-frontend:v3-local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: cicor-web-config
            - secretRef:
                name: cicor-web-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: cache-volume
              mountPath: /var/cache/nginx
            - name: run-volume
              mountPath: /var/run
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: run-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cicor-web-svc
  namespace: cicor-web
  labels:
    app.kubernetes.io/name: cicor-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: cicor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cicor-web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cicor-web-ingress
  namespace: cicor-web
  labels:
    app.kubernetes.io/name: cicor-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: cicor
spec:
  ingressClassName: nginx
  rules:
    - host: cicor.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cicor-web-svc
                port:
                  number: 80
