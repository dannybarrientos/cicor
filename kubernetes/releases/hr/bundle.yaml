apiVersion: v1
kind: Namespace
metadata:
  name: cicor-hr
  labels:
    app.kubernetes.io/name: cicor-hr
    app.kubernetes.io/part-of: cicor
    app.kubernetes.io/component: hr
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cicor-hr-config
  namespace: cicor-hr
data:
  APP_ENVIRONMENT: local
  MODULE_NAME: hr
  MODULE_TITLE: CICOR Recursos Humanos
  API_BASE_PATH: /api/hr
  API_PUBLIC_BASE_URL: http://cicor.local/api/hr
  POSTGRES_HOST: cicor-hr-db-svc
  POSTGRES_PORT: "5432"
  POSTGRES_DB: cicor_hr_db
  PGDATA: /var/lib/postgresql/data/pgdata
  LOG_LEVEL: INFO
---
apiVersion: v1
kind: Secret
metadata:
  name: cicor-hr-secret
  namespace: cicor-hr
type: Opaque
stringData:
  POSTGRES_USER: cicor_user
  POSTGRES_PASSWORD: cicor_pass
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cicor-hr-db-pvc
  namespace: cicor-hr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicor-hr-db
  namespace: cicor-hr
  labels:
    app.kubernetes.io/name: cicor-hr-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: cicor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cicor-hr-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cicor-hr-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: cicor
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: database
          image: cicor-hr-db:v3-local
          imagePullPolicy: Never
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - configMapRef:
                name: cicor-hr-config
            - secretRef:
                name: cicor-hr-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cicor-hr-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cicor-hr-db-svc
  namespace: cicor-hr
  labels:
    app.kubernetes.io/name: cicor-hr-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: cicor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cicor-hr-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicor-hr-api
  namespace: cicor-hr
  labels:
    app.kubernetes.io/name: cicor-hr-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cicor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cicor-hr-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cicor-hr-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: cicor
    spec:
      containers:
        - name: api
          image: cicor-hr-api:v3-local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: cicor-hr-config
            - secretRef:
                name: cicor-hr-secret
          env:
            - name: PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cicor-hr-api-svc
  namespace: cicor-hr
  labels:
    app.kubernetes.io/name: cicor-hr-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cicor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cicor-hr-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cicor-hr-ingress
  namespace: cicor-hr
  labels:
    app.kubernetes.io/name: cicor-hr-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cicor
spec:
  ingressClassName: nginx
  rules:
    - host: cicor.local
      http:
        paths:
          - path: /api/hr
            pathType: Prefix
            backend:
              service:
                name: cicor-hr-api-svc
                port:
                  number: 80
