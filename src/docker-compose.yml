name: cicor

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:18.4-alpine
    container_name: prueba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-cicor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cicor}
      POSTGRES_DB: ${DB_NAME:-cicor}
    volumes:
      - prueba_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cicor} -d ${DB_NAME:-cicor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-5432}:5432"

