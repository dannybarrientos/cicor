# ============================================================
# CICOR ERP - nginx/default.conf
# Descripción: Configuración del servidor Nginx para docker-compose.
#              Se monta en /etc/nginx/conf.d/default.conf, que es
#              incluido automáticamente por el nginx.conf base de
#              la imagen oficial nginx:alpine dentro del bloque http{}.
#
# Rutas expuestas:
#   http://localhost/                    → Frontend React   (:3000)
#   http://localhost/api/commercial/*   → commercial-api   (:8000)
#   http://localhost/api/inventory/*    → inventory-api    (:8000)
#   http://localhost/api/accounting/*   → accounting-api   (:8000)
#   http://localhost/api/operations/*   → operations-api   (:8000)
#   http://localhost/api/hr/*           → hr-api           (:8000)
#   http://localhost/prometheus/        → Prometheus        (:9090)
#   http://localhost/grafana/           → Grafana           (:3000 interno)
#
# Montar con:
#   - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
# ============================================================

# ── Upstreams ─────────────────────────────────────────────────
# Nombres = nombres de servicio definidos en docker-compose.yml
# Docker Compose los resuelve via DNS interno de la red cicor-network.

upstream frontend_upstream {
    server frontend:3000;
}

upstream commercial_upstream {
    server commercial-api:8000;
}

upstream inventory_upstream {
    server inventory-api:8000;
}

upstream accounting_upstream {
    server accounting-api:8000;
}

upstream operations_upstream {
    server operations-api:8000;
}

upstream hr_upstream {
    server hr-api:8000;
}

# # #upstream prometheus_upstream {
# # #    server prometheus:9090;
# # #}

# # #upstream grafana_upstream {
# # #    server grafana:3000;
# # #}

# ── Servidor principal ────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    client_max_body_size 10m;

    # Timeouts de proxy
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Headers comunes a todos los upstreams
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;


    # ── API Comercial ──────────────────────────────────────────
    location /api/commercial/ {
        proxy_pass http://commercial_upstream/api/commercial/;
    }
    location = /api/commercial/docs {
        proxy_pass http://commercial_upstream/docs;
    }
    location = /api/commercial/redoc {
        proxy_pass http://commercial_upstream/redoc;
    }
    location = /api/commercial/openapi.json {
        proxy_pass http://commercial_upstream/openapi.json;
    }

    # ── API Inventario ─────────────────────────────────────────
    location /api/inventory/ {
        proxy_pass http://inventory_upstream/api/inventory/;
    }
    location = /api/inventory/docs {
        proxy_pass http://inventory_upstream/docs;
    }
    location = /api/inventory/redoc {
        proxy_pass http://inventory_upstream/redoc;
    }
    location = /api/inventory/openapi.json {
        proxy_pass http://inventory_upstream/openapi.json;
    }

    # ── API Contabilidad ───────────────────────────────────────
    location /api/accounting/ {
        proxy_pass http://accounting_upstream/api/accounting/;
    }
    location = /api/accounting/docs {
        proxy_pass http://accounting_upstream/docs;
    }
    location = /api/accounting/redoc {
        proxy_pass http://accounting_upstream/redoc;
    }
    location = /api/accounting/openapi.json {
        proxy_pass http://accounting_upstream/openapi.json;
    }

    # ── API Operaciones ────────────────────────────────────────
    location /api/operations/ {
        proxy_pass http://operations_upstream/api/operations/;
    }
    location = /api/operations/docs {
        proxy_pass http://operations_upstream/docs;
    }
    location = /api/operations/redoc {
        proxy_pass http://operations_upstream/redoc;
    }
    location = /api/operations/openapi.json {
        proxy_pass http://operations_upstream/openapi.json;
    }

    # ── API RRHH ───────────────────────────────────────────────
    location /api/hr/ {
        proxy_pass http://hr_upstream/api/hr/;
    }
    location = /api/hr/docs {
        proxy_pass http://hr_upstream/docs;
    }
    location = /api/hr/redoc {
        proxy_pass http://hr_upstream/redoc;
    }
    location = /api/hr/openapi.json {
        proxy_pass http://hr_upstream/openapi.json;
    }

    # ── Prometheus ─────────────────────────────────────────────
    # # #location /prometheus/ {
    # # #    rewrite ^/prometheus/(.*)$ /$1 break;
    # # #    proxy_pass http://prometheus_upstream;
    # # #}

    # ── Grafana ────────────────────────────────────────────────
    # # #location /grafana/ {
    # # #    rewrite ^/grafana/(.*)$ /$1 break;
    # # #    proxy_pass http://grafana_upstream;
    # # #    proxy_set_header X-Forwarded-Host $host;
    # # #}

    # ── Frontend React (catch-all — debe ir al final) ──────────
    # FIX: proxy_pass dentro de named location (@) NO puede tener
    # URI (la barra final). Se usa la variable $uri para el fallback
    # que soporte React Router sin el error de sintaxis de Nginx.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Accept-Encoding "";

        # Si el upstream devuelve 404 (ruta SPA no existente en servidor)
        # se captura con error_page y se reenvía el index.html
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # Sirve index.html para React Router desde el upstream del frontend
    location = /index.html {
        proxy_pass http://frontend_upstream;
    }
}
